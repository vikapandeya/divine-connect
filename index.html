<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/divineconnect-mark.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#111827" />
    <title>PunyaSeva</title>
    <script>
      (function () {
        const base = '/divine-connect';
        const docsBase = '/divine-connect/docs/';

        // Already inside the SPA — do not redirect
        if (window.location.pathname.startsWith(docsBase)) return;

        const path = window.location.pathname.replace(new RegExp(`^${base}`), '') || '/';

        if (window.location.pathname === base || window.location.pathname === base + '/') {
          window.location.replace(docsBase);
        } else if (window.location.pathname.startsWith(base + '/')) {
          window.location.replace(docsBase + '#' + path + window.location.search + window.location.hash);
        }
      })();
    </script>
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) {
          return;
        }

        window.addEventListener('load', function () {
          navigator.serviceWorker.getRegistrations().then(function (registrations) {
            registrations.forEach(function (registration) {
              registration.unregister().catch(function () {
                return undefined;
              });
            });
          });

          if (!('caches' in window)) {
            return;
          }

          caches.keys().then(function (keys) {
            keys
              .filter(function (key) {
                return key.indexOf('divine-connect-runtime-') === 0
                  || key.indexOf('punyaseva-runtime-') === 0;
              })
              .forEach(function (key) {
                caches.delete(key).catch(function () {
                  return undefined;
                });
              });
          });
        });
      }());
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
