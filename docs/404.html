<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        const spaBase = '/divine-connect/docs/';
        const repoBase = '/divine-connect/';
        let path = window.location.pathname;

        // Extract the route portion by stripping the deployment prefix
        if (path.startsWith(spaBase)) {
          path = '/' + path.slice(spaBase.length);
        } else if (path.startsWith(repoBase)) {
          path = '/' + path.slice(repoBase.length);
        } else {
          path = '/';
        }

        window.location.replace(
          spaBase + '#' + path + window.location.search + window.location.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
